<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MRC SRv6 Fabric — Topology</title>
<style>
  :root{
    --bg:#0b1016; --panel:#111a24; --ink:#dce6f0; --dim:#7c8ea0;
    --rule:#22303d; --spine:#f0a830; --leaf:#3fb6d3; --gpu:#8a7cf0;
    --link:#33485a; --link-hot:#5fd0a0; --accent:#1f6fb2;
    --p1:#1d3b5c; --p2:#3a2456; --p3:#0f4d3a; --p4:#5c2030;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 70% -10%, #13202c 0%, transparent 60%),
      var(--bg);
    color:var(--ink);
    font:14px/1.45 ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    -webkit-font-smoothing:antialiased;
  }
  header{
    display:flex;align-items:baseline;gap:16px;
    padding:16px 22px;border-bottom:1px solid var(--rule);
    background:linear-gradient(180deg,#0e151d,#0b1016);
    position:sticky;top:0;z-index:5;
  }
  header h1{font-size:15px;letter-spacing:.14em;text-transform:uppercase;margin:0;font-weight:600}
  header h1 b{color:var(--spine)}
  header .sub{color:var(--dim);font-size:12px;letter-spacing:.04em}
  header .spacer{flex:1}
  .stat{color:var(--dim);font-size:12px}
  .stat b{color:var(--ink);font-weight:600}
  .wrap{display:flex;height:calc(100vh - 53px)}
  .stage{flex:1;overflow:auto;padding:26px}
  svg{display:block;margin:0 auto}
  /* nodes */
  .node rect,.node circle{stroke-width:1.5}
  .node text{font-size:11px;fill:var(--ink);text-anchor:middle;dominant-baseline:central;pointer-events:none}
  .node .sub{font-size:8.5px;fill:var(--dim)}
  .node{cursor:pointer}
  .node:hover rect,.node:hover circle{stroke:#fff}
  .spine rect{fill:#241a0c;stroke:var(--spine)}
  .leaf  rect{fill:#0c2630;stroke:var(--leaf)}
  .gpu   rect{fill:#1a1630;stroke:var(--gpu)}
  .planeband{fill-opacity:.32;stroke-opacity:.5;stroke-width:1}
  .planelabel{fill:var(--dim);font-size:11px;letter-spacing:.18em;text-transform:uppercase}
  .edge{stroke:var(--link);stroke-width:1.4;fill:none}
  .edge.gpu{stroke:var(--gpu);stroke-opacity:.45}
  .edge.hot{stroke:var(--link-hot);stroke-width:2.4}
  .dim{opacity:.12;transition:opacity .15s}
  .node,.edge{transition:opacity .15s}
  /* side panel */
  aside{
    width:320px;border-left:1px solid var(--rule);background:var(--panel);
    padding:18px 18px 28px;overflow:auto
  }
  aside h2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin:0 0 12px}
  .empty{color:var(--dim);font-size:12px;line-height:1.7}
  .card{border:1px solid var(--rule);border-radius:7px;padding:13px 14px;margin-bottom:12px;background:#0d141c}
  .card .name{font-size:15px;font-weight:600;margin-bottom:2px}
  .pill{display:inline-block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
        padding:2px 8px;border-radius:20px;margin-top:4px}
  .pill.spine{background:#241a0c;color:var(--spine);border:1px solid var(--spine)}
  .pill.leaf{background:#0c2630;color:var(--leaf);border:1px solid var(--leaf)}
  .pill.gpu{background:#1a1630;color:var(--gpu);border:1px solid var(--gpu)}
  .kv{display:grid;grid-template-columns:88px 1fr;gap:4px 10px;margin-top:11px;font-size:12px}
  .kv .k{color:var(--dim)}
  .kv .v{color:var(--ink);word-break:break-all}
  .links-list{margin-top:6px;font-size:11.5px;color:var(--dim)}
  .links-list div{padding:3px 0;border-top:1px solid var(--rule)}
  .links-list b{color:var(--ink);font-weight:600}
  /* node actions + config viewer + maintenance */
  .panel-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
  .btn{background:#16212c;color:var(--ink);border:1px solid var(--rule);border-radius:6px;
       padding:5px 10px;font:inherit;font-size:11.5px;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .btn.warn{border-color:#8a5a30;color:#f0b070}
  .btn.warn:hover{background:#241606}
  .btn.on{background:#3a1a0e;border-color:#f0a040;color:#ffce88}
  .cfgbox{margin-top:14px}
  .cfg-meta{color:var(--dim);font-size:10.5px;margin:4px 0 6px}
  .cfg-meta b{color:var(--ink)}
  .cfg-meta a{color:var(--leaf);cursor:pointer}
  pre.cfg{background:#070c11;border:1px solid var(--rule);border-radius:6px;padding:10px 12px;
          margin:0;max-height:300px;overflow:auto;font-size:11px;line-height:1.5;
          color:#cfe0f0;white-space:pre}
  .node.bypassed rect,.node.bypassed circle{stroke:#ff6a6a;stroke-width:2.6;stroke-dasharray:4 3}
  .node.bypassed text{fill:#ff9a9a}
  .maint{font-size:11.5px;color:#f0a060}
  .maint b{color:#ffd090;font-weight:600}
  .draintag{color:#f0a060;font-size:10px;border:1px solid #7a4a20;border-radius:4px;
            padding:1px 6px;margin-left:6px;vertical-align:1px}
  .legend{display:flex;gap:16px;align-items:center;margin-top:14px;font-size:11px;color:var(--dim)}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .controls{display:flex;gap:8px;align-items:center}
  .controls button{
    background:#16212c;color:var(--ink);border:1px solid var(--rule);
    border-radius:6px;padding:5px 11px;font:inherit;font-size:12px;cursor:pointer
  }
  .controls button:hover{border-color:var(--accent)}
  .filedrop{color:var(--dim);font-size:11px}
  .filedrop input{display:none}
  .filedrop label{color:var(--leaf);cursor:pointer;text-decoration:underline}
  .err{color:#ff8e8e;font-size:12px;padding:20px}
  /* ---- layout: topology on top, paths table beneath ---- */
  body{display:flex;flex-direction:column;overflow:hidden}
  .wrap{flex:1 1 56%;min-height:0}
  .paths{flex:0 0 44%;min-height:0;display:flex;flex-direction:column;
         border-top:1px solid var(--rule);background:#0a0f15}
  .paths-head{display:flex;align-items:baseline;gap:14px;padding:9px 20px;
              border-bottom:1px solid var(--rule)}
  .paths-head h2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin:0}
  .paths-head h2 b{color:var(--leaf)}
  .paths-head .meshstat{font-size:11px;color:var(--dim)}
  .paths-head .meshstat b{color:var(--ink);font-weight:600}
  .paths-head .grow{flex:1}
  .paths-head label{font-size:11px;color:var(--dim);cursor:pointer;user-select:none}
  .paths-head input[type=checkbox]{vertical-align:-1px;margin-right:4px}
  .paths-scroll{flex:1;overflow:auto}
  table.pt{border-collapse:collapse;width:100%;font-size:11.5px}
  table.pt th,table.pt td{padding:5px 11px;text-align:left;white-space:nowrap}
  table.pt thead th{position:sticky;top:0;background:#0d141c;color:var(--dim);
      font-weight:600;letter-spacing:.03em;border-bottom:1px solid var(--rule);z-index:1}
  table.pt thead th.grp{text-align:center;border-left:1px solid var(--rule);color:#9fb0c2}
  table.pt tbody tr{border-bottom:1px solid #121b25}
  table.pt tbody tr:hover{background:#10202c}
  table.pt tbody tr.sel{background:#13283a}
  table.pt td.num{text-align:right;font-variant-numeric:tabular-nums}
  table.pt td.dir{border-left:1px solid #1a2632}
  table.pt .path b{color:var(--ink)}
  table.pt .carrier{color:var(--dim);font-size:10.5px}
  table.pt .pl{display:inline-block;min-width:14px;color:var(--dim)}
  table.pt .miss{color:#42525f}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:0;margin-right:6px}
  .dot.up{background:var(--link-hot)} .dot.deg{background:#f0c050}
  .dot.down{background:#ff7a7a} .dot.none{background:#3a4a5a}
  .dot.denied{background:#c08af0}
  .st-up{color:var(--link-hot)} .st-deg{color:#f0c050}
  .st-down{color:#ff7a7a} .st-none{color:#5a6b7a} .st-denied{color:#c08af0}
  .paths-empty{padding:18px 20px;color:var(--dim);font-size:12px;line-height:1.7}
  /* console modal (feature 4) */
  .modal-bg{position:fixed;inset:0;background:rgba(4,8,12,.72);z-index:40;display:none;
            align-items:center;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{width:min(1000px,94vw);height:min(680px,88vh);background:#0b1219;
         border:1px solid var(--rule);border-radius:10px;display:flex;flex-direction:column;
         box-shadow:0 24px 60px rgba(0,0,0,.6)}
  .modal-head{display:flex;align-items:center;gap:12px;padding:11px 16px;
              border-bottom:1px solid var(--rule)}
  .modal-head .mname{font-weight:600;font-size:14px}
  .modal-head .tabs{display:flex;gap:6px;margin-left:8px}
  .modal-head .tab{background:#131e28;border:1px solid var(--rule);color:var(--dim);
                   border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer}
  .modal-head .tab.active{color:var(--ink);border-color:var(--accent);background:#16283a}
  .modal-head .grow{flex:1}
  .modal-head .x{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;line-height:1}
  .modal-head .x:hover{color:#fff}
  .modal-body{flex:1;min-height:0;position:relative}
  .pane{position:absolute;inset:0;display:none;flex-direction:column}
  .pane.active{display:flex}
  #termHost{flex:1;min-height:0;padding:8px 6px 6px 10px;background:#000;border-bottom-left-radius:10px;border-bottom-right-radius:10px}
  .runbar{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--rule);flex-wrap:wrap}
  .runbar input{flex:1;min-width:180px;background:#060b10;border:1px solid var(--rule);
                border-radius:6px;color:var(--ink);font:inherit;font-size:12px;padding:7px 10px}
  .runbar .quick{display:flex;gap:6px;flex-wrap:wrap;width:100%}
  .runbar .quick button{font-size:11px;padding:3px 9px}
  pre.runout{flex:1;margin:0;overflow:auto;background:#070c11;padding:12px 14px;
             font-size:11.5px;line-height:1.5;color:#cfe0f0;white-space:pre-wrap}
  .conn{font-size:11px;color:var(--dim)} .conn.ok{color:var(--link-hot)} .conn.err{color:#ff7a7a}
</style>
<link rel="stylesheet" href="/gui/vendor/xterm.css">
<script src="/gui/vendor/xterm.js"></script>
<script src="/gui/vendor/xterm-addon-fit.js"></script>
</head>
<body>
<header>
  <h1>MRC <b>SRv6</b> Fabric</h1>
  <span class="sub" id="fabricName">loading…</span>
  <span class="maint" id="maint"></span>
  <div class="spacer"></div>
  <span class="stat" id="counts"></span>
  <div class="controls">
    <span class="filedrop">data:
      <label for="file">load fabric_vars.json</label>
      <input type="file" id="file" accept=".json">
    </span>
    <button id="dlcfg" title="Download every node config as a .tar.gz">⬇ configs</button>
    <button id="fit">Fit</button>
  </div>
</header>

<div class="wrap">
  <div class="stage" id="stage">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <aside>
    <h2>Inspector</h2>
    <div id="panel" class="empty">
      Hover a node to highlight its links.<br>Click to pin its details here.
      <div class="legend">
        <span><i style="background:#f0a830"></i>spine</span>
        <span><i style="background:#3fb6d3"></i>leaf</span>
        <span><i style="background:#8a7cf0"></i>gpu</span>
      </div>
    </div>
  </aside>
</div>

<section class="paths">
  <div class="paths-head">
    <h2>Paths — <b>test-probe</b> health</h2>
    <span class="meshstat" id="meshStat">—</span>
    <span class="grow"></span>
    <label><input type="checkbox" id="symToggle" checked> symmetric pairs</label>
  </div>
  <div class="paths-scroll">
    <table class="pt" id="pathsTable"><thead></thead><tbody></tbody></table>
    <div class="paths-empty" id="pathsEmpty" style="display:none"></div>
  </div>
</section>

<div class="modal-bg" id="consoleModal">
  <div class="modal">
    <div class="modal-head">
      <span class="mname" id="mName">node</span>
      <div class="tabs">
        <button class="tab active" id="tabTerm" data-pane="paneTerm">⌨ Terminal</button>
        <button class="tab" id="tabRun" data-pane="paneRun">≫ Quick run</button>
      </div>
      <span class="conn" id="connState"></span>
      <span class="grow"></span>
      <button class="x" id="mClose" title="Close (Esc)">×</button>
    </div>
    <div class="modal-body">
      <div class="pane active" id="paneTerm"><div id="termHost"></div></div>
      <div class="pane" id="paneRun">
        <div class="runbar">
          <input id="runInput" placeholder="command to run on this node (e.g. ip -6 route)"
                 autocomplete="off" spellcheck="false">
          <button class="btn" id="runBtn">Run</button>
          <div class="quick" id="runQuick"></div>
        </div>
        <pre class="runout" id="runOut">Run a command to see its output.</pre>
      </div>
    </div>
  </div>
</div>

<script>
const SVGNS="http://www.w3.org/2000/svg";
let DATA=null, NODES={}, byName={};
let EDGES=null;        // edge records, for highlighting a carrier path
let MESH=null;         // latest /api/mesh response (null until backend reached)
let backendOk=false;   // did the last /api/mesh fetch succeed?
let selPathKey=null;   // pinned path row key

// ---------- data loading ----------
async function boot(){
  // try to fetch fabric_vars.json sitting next to this file (or one dir up,
  // or at the served repo root when this page is served from /gui/)
  for(const url of ["fabric_vars.json","../fabric_vars.json","/fabric_vars.json"]){
    try{
      const r=await fetch(url,{cache:"no-store"});
      if(r.ok){ render(await r.json()); return; }
    }catch(e){/* fetch blocked on file:// — fall through to picker */}
  }
  document.getElementById("fabricName").textContent="no fabric_vars.json found";
  document.getElementById("panel").innerHTML=
    '<div class="empty">Could not auto-load <b>fabric_vars.json</b>.<br><br>'+
    'If you opened this file directly (file://), the browser blocks local fetch. '+
    'Use the <b>load fabric_vars.json</b> link in the header, or serve the folder '+
    '(<code>python3 -m http.server</code>) and reload.</div>';
}
document.getElementById("file").addEventListener("change",ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ render(JSON.parse(rd.result)); }
    catch(e){ document.getElementById("panel").innerHTML='<div class="err">Bad JSON: '+e.message+'</div>'; } };
  rd.readAsText(f);
});

// ---------- layout + render ----------
const NODE_W=92, NODE_H=34, GPU_R=20;
const COL_GAP=34, PLANE_GAP=46, ROW_GAP=70, PAD=40;

function render(data){
  DATA=data; byName={};
  const svg=document.getElementById("svg");
  svg.innerHTML="";
  document.getElementById("fabricName").textContent=data.name||"fabric";

  const nodes=data.nodes||{};
  const planes={};   // plane -> {spine:[],leaf:[]}
  const gpus=[];
  for(const [name,nd] of Object.entries(nodes)){
    nd._name=name;
    if(nd.role==="gpu"){ gpus.push(nd); continue; }
    const p=nd.plane||1;
    (planes[p]=planes[p]||{spine:[],leaf:[]})[nd.role].push(nd);
  }
  const planeIds=Object.keys(planes).map(Number).sort((a,b)=>a-b);
  // sort within rows by index
  const byIndex=(a,b)=>(a.index||0)-(b.index||0);
  planeIds.forEach(p=>{planes[p].spine.sort(byIndex);planes[p].leaf.sort(byIndex);});
  gpus.sort(byIndex);

  // width is driven by the widest plane row (spines or leaves), and by gpus
  const widest=Math.max(
    1,
    ...planeIds.map(p=>Math.max(planes[p].spine.length,planes[p].leaf.length)),
    gpus.length
  );
  const planeW=widest*NODE_W+(widest-1)*COL_GAP;
  const totalW=planeW*planeIds.length+PLANE_GAP*(planeIds.length-1)+PAD*2;

  // vertical: each plane has spine row + leaf row; gpus sit in a shared row below all planes
  const planeRowsH=2*NODE_H+ROW_GAP;           // spine row, gap, leaf row
  const planeBandTop=PAD+24;                    // leave room for plane label
  const gpuRowY=planeBandTop+planeRowsH+ROW_GAP+30;
  const totalH=gpuRowY+GPU_R*2+PAD;

  svg.setAttribute("viewBox",`0 0 ${totalW} ${totalH}`);
  svg.setAttribute("width",totalW); svg.setAttribute("height",totalH);

  const planeColors=["var(--p1)","var(--p2)","var(--p3)","var(--p4)"];
  const pos={}; // name -> {x,y,r?}

  // place plane bands + nodes
  planeIds.forEach((p,pi)=>{
    const ox=PAD+pi*(planeW+PLANE_GAP);
    // band
    const band=el("rect",{x:ox-14,y:planeBandTop-22,width:planeW+28,
      height:planeRowsH+34,rx:12,class:"planeband",
      fill:planeColors[pi%4],stroke:planeColors[pi%4]});
    svg.appendChild(band);
    svg.appendChild(el("text",{x:ox+planeW/2,y:planeBandTop-30,
      "text-anchor":"middle",class:"planelabel"},`plane ${p}`));

    const spineY=planeBandTop+NODE_H/2;
    const leafY=planeBandTop+NODE_H+ROW_GAP+NODE_H/2;
    rowPlace(planes[p].spine,ox,planeW,spineY,pos);
    rowPlace(planes[p].leaf, ox,planeW,leafY, pos);
  });
  // gpus shared row, centered across whole canvas
  rowPlace(gpus,PAD,totalW-2*PAD,gpuRowY+GPU_R,pos,true);

  // edges first (under nodes)
  const edgeLayer=el("g",{}); svg.appendChild(edgeLayer);
  const edges=[];
  (data.links||[]).forEach(l=>{
    const a=l.a.split(":")[0], b=l.b.split(":")[0];
    if(!pos[a]||!pos[b]) return;
    const isGpu=(nodes[a]&&nodes[a].role==="gpu")||(nodes[b]&&nodes[b].role==="gpu");
    const path=el("path",{class:"edge"+(isGpu?" gpu":""),
      d:curve(pos[a],pos[b])});
    path.dataset.a=a; path.dataset.b=b;
    edgeLayer.appendChild(path);
    edges.push({a,b,el:path});
  });

  // nodes
  const nodeLayer=el("g",{}); svg.appendChild(nodeLayer);
  for(const [name,nd] of Object.entries(nodes)){
    const p=pos[name]; if(!p) continue;
    const g=el("g",{class:"node "+nd.role}); g.dataset.name=name;
    if(nd.role==="gpu"){
      g.appendChild(el("rect",{x:p.x-GPU_R,y:p.y-GPU_R,width:GPU_R*2,height:GPU_R*2,rx:10}));
      g.appendChild(el("text",{x:p.x,y:p.y},shortName(name)));
    }else{
      g.appendChild(el("rect",{x:p.x-NODE_W/2,y:p.y-NODE_H/2,width:NODE_W,height:NODE_H,rx:7}));
      g.appendChild(el("text",{x:p.x,y:p.y-3},shortName(name)));
      if(nd.loopback)
        g.appendChild(el("text",{x:p.x,y:p.y+9,class:"sub"},loStr(nd.loopback)));
    }
    g.addEventListener("mouseenter",()=>highlight(name,edges));
    g.addEventListener("mouseleave",()=>{ if(!pinned) clearHi(edges); });
    g.addEventListener("click",()=>{ pinned=name; showInfo(name,nodes); highlight(name,edges); });
    nodeLayer.appendChild(g);
    byName[name]=g;
  }

  // counts
  const ns=Object.values(nodes);
  document.getElementById("counts").innerHTML=
    `<b>${planeIds.length}</b> plane${planeIds.length>1?"s":""} · `+
    `<b>${ns.filter(n=>n.role==="spine").length}</b> spine · `+
    `<b>${ns.filter(n=>n.role==="leaf").length}</b> leaf · `+
    `<b>${gpus.length}</b> gpu · <b>${(data.links||[]).length}</b> links`;

  EDGES=edges;
  window._fit=()=>fit(svg);
  fit(svg);
  renderBypass();     // re-mark bypassed nodes after a fresh render
  rebuildPaths();
}

let pinned=null;

function rowPlace(arr,ox,width,y,pos,isGpu){
  const n=arr.length; if(!n) return;
  const unit=isGpu?GPU_R*2:NODE_W;
  const gap=isGpu?Math.max(COL_GAP,(width-n*unit)/(n+1)):COL_GAP;
  const rowW=n*unit+(n-1)*gap;
  let x=ox+(width-rowW)/2+unit/2;
  arr.forEach(nd=>{ pos[nd._name]={x,y}; x+=unit+gap; });
}

function curve(a,b){
  const my=(a.y+b.y)/2;
  return `M${a.x},${a.y} C${a.x},${my} ${b.x},${my} ${b.x},${b.y}`;
}

function highlight(name,edges){
  const touch=new Set([name]);
  edges.forEach(e=>{ if(e.a===name||e.b===name){touch.add(e.a);touch.add(e.b);} });
  edges.forEach(e=>{
    const on=e.a===name||e.b===name;
    e.el.classList.toggle("hot",on);
    e.el.classList.toggle("dim",!on);
  });
  Object.entries(byName).forEach(([n,g])=>g.classList.toggle("dim",!touch.has(n)));
}
function clearHi(edges){
  pinned=null;
  edges.forEach(e=>{e.el.classList.remove("hot","dim");});
  Object.values(byName).forEach(g=>g.classList.remove("dim"));
  document.getElementById("panel").className="empty";
  document.getElementById("panel").innerHTML=
    'Hover a node to highlight its links.<br>Click to pin its details here.';
}

function showInfo(name,nodes){
  const nd=nodes[name]; if(!nd) return;
  const links=(DATA.links||[]).filter(l=>l.a.split(":")[0]===name||l.b.split(":")[0]===name)
    .map(l=>{
      const me=l.a.split(":")[0]===name?l:{a:l.b,b:l.a};
      const myIf=me.a.split(":")[1]||"", peer=me.b.split(":")[0], peerIf=me.b.split(":")[1]||"";
      return `<div><b>${myIf}</b> → ${peer} <span style="color:var(--dim)">${peerIf}</span></div>`;
    }).join("");
  const kv=[];
  kv.push(["role",nd.role]);
  if(nd.plane) kv.push(["plane",nd.plane]);
  if(nd.index!=null) kv.push(["index",nd.index]);
  if(nd.mgmt) kv.push(["mgmt",nd.mgmt]);
  if(nd.loopback) kv.push(["loopback",nd.loopback]);
  if(nd.srv6&&nd.srv6.locator) kv.push(["locator",nd.srv6.locator]);
  if(nd.kind) kv.push(["kind",nd.kind]);
  const bypassed=BYPASS.has(name);
  const nlinks=(DATA.links||[]).filter(l=>l.a.split(":")[0]===name||l.b.split(":")[0]===name).length;
  const p=document.getElementById("panel"); p.className="";
  p.innerHTML=
    `<div class="card">
       <div class="name">${name}${bypassed?'<span class="draintag">bypassed</span>':''}</div>
       <span class="pill ${nd.role}">${nd.role}</span>
       <div class="kv">${kv.map(([k,v])=>`<div class="k">${k}</div><div class="v">${v}</div>`).join("")}</div>
       <div class="panel-actions">
         <button class="btn ${bypassed?'on':'warn'}" id="bypassBtn">${bypassed?'● Restore node':'⏻ Bypass (drain)'}</button>
         ${CONSOLE_ENABLED?`<button class="btn" id="consoleBtn">⌨ Console</button>`:''}
       </div>
     </div>
     <h2>Links (${nlinks})</h2>
     <div class="links-list">${links||'<div style="color:var(--dim)">none</div>'}</div>
     <div class="cfgbox">
       <h2>Config</h2>
       <div class="cfg-meta" id="cfgMeta">loading…</div>
       <pre class="cfg" id="cfgPre" style="display:none"></pre>
     </div>`;
  const bb=document.getElementById("bypassBtn");
  if(bb) bb.addEventListener("click",()=>toggleBypass(name));
  const cb=document.getElementById("consoleBtn");
  if(cb) cb.addEventListener("click",()=>openConsole(name));
  loadConfig(name);
}

// ---- feature 4: node console (interactive terminal + quick-run) ----
let CONSOLE_ENABLED=false;
let TERM=null, FIT=null, WS=null, CONSOLE_NODE=null;
const QUICK={
  spine:["show ipv6 route","show running-config"],
  leaf:["show ipv6 route","show running-config"],
  gpu:["ip -6 route show table 100","ip -6 rule show","cat /run/mrc-agent.json | head -40"]
};
function fetchConsoleInfo(){
  fetch("/api/console-info",{cache:"no-store"}).then(r=>r.json())
    .then(d=>{ CONSOLE_ENABLED=!!d.enabled; }).catch(()=>{CONSOLE_ENABLED=false;});
}
function setConn(txt,cls){ const e=document.getElementById("connState");
  if(e){ e.textContent=txt; e.className="conn"+(cls?" "+cls:""); } }
function switchPane(id){
  document.querySelectorAll(".modal .tab").forEach(t=>t.classList.toggle("active",t.dataset.pane===id));
  document.querySelectorAll(".modal .pane").forEach(p=>p.classList.toggle("active",p.id===id));
  if(id==="paneTerm"&&FIT){ setTimeout(()=>{try{FIT.fit();sendResize();TERM&&TERM.focus();}catch(e){}},30); }
}
function sendResize(){ if(WS&&WS.readyState===1&&TERM)
  try{ WS.send(JSON.stringify({type:"resize",cols:TERM.cols,rows:TERM.rows})); }catch(e){} }
function openConsole(name){
  CONSOLE_NODE=name;
  const role=((DATA&&DATA.nodes&&DATA.nodes[name])||{}).role||"gpu";
  document.getElementById("mName").textContent=name+"  ·  "+role;
  document.getElementById("consoleModal").classList.add("open");
  // quick-run buttons for this role
  const q=document.getElementById("runQuick"); q.innerHTML="";
  const cmds=(QUICK[role]||[]).map(c=> role==="gpu"?c:`vtysh -c "${c}"`);
  cmds.forEach(c=>{ const b=document.createElement("button"); b.className="btn";
    b.textContent=c.length>34?c.slice(0,32)+"…":c;
    b.title=c; b.addEventListener("click",()=>{ document.getElementById("runInput").value=c; runCmd(); });
    q.appendChild(b); });
  document.getElementById("runOut").textContent="Run a command to see its output.";
  switchPane("paneTerm");
  startTerm(name);
}
function startTerm(name){
  const host=document.getElementById("termHost"); host.innerHTML="";
  TERM=new Terminal({fontSize:12,fontFamily:'ui-monospace,Menlo,Consolas,monospace',
    theme:{background:"#000000"},cursorBlink:true,convertEol:false,scrollback:4000});
  try{ FIT=new FitAddon.FitAddon(); TERM.loadAddon(FIT); }catch(e){ FIT=null; }
  TERM.open(host); try{ FIT&&FIT.fit(); }catch(e){}
  setConn("connecting…");
  const proto=location.protocol==="https:"?"wss":"ws";
  WS=new WebSocket(`${proto}://${location.host}/api/console?node=${encodeURIComponent(name)}`);
  WS.binaryType="arraybuffer";
  const enc=new TextEncoder();
  WS.onopen=()=>{ setConn("● connected","ok"); sendResize(); TERM.focus(); };
  WS.onmessage=ev=>{ if(typeof ev.data==="string") TERM.write(ev.data);
    else TERM.write(new Uint8Array(ev.data)); };
  WS.onclose=()=>{ setConn("● disconnected","err"); TERM&&TERM.write("\r\n[console closed]\r\n"); };
  WS.onerror=()=>setConn("● error","err");
  TERM.onData(d=>{ if(WS&&WS.readyState===1) WS.send(enc.encode(d)); });
  window.addEventListener("resize",consoleResize);
}
function consoleResize(){ if(FIT&&document.getElementById("consoleModal").classList.contains("open")){
  try{ FIT.fit(); sendResize(); }catch(e){} } }
function closeConsole(){
  document.getElementById("consoleModal").classList.remove("open");
  window.removeEventListener("resize",consoleResize);
  try{ WS&&WS.close(); }catch(e){} WS=null;
  try{ TERM&&TERM.dispose(); }catch(e){} TERM=null; FIT=null; CONSOLE_NODE=null;
}
function runCmd(){
  const inp=document.getElementById("runInput"), out=document.getElementById("runOut");
  const cmd=inp.value.trim(); if(!cmd||!CONSOLE_NODE) return;
  out.textContent="running…";
  fetch("/api/exec",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({node:CONSOLE_NODE,cmd})})
    .then(r=>r.json())
    .then(d=>{ out.textContent = d.error ? ("error: "+d.error)
      : ((d.out||"").replace(/\s+$/,"") + `\n\n[exit ${d.rc}]`); })
    .catch(e=>{ out.textContent="request failed: "+e; });
}

// ---- feature 5: maintenance bypass (drain traffic off a node) ----
let BYPASS=new Set();
function renderBypass(){
  Object.entries(byName).forEach(([n,g])=>g.classList.toggle("bypassed",BYPASS.has(n)));
  const m=document.getElementById("maint");
  if(m){ const a=[...BYPASS]; m.innerHTML=a.length?`⚠ maintenance drain: <b>${a.join(", ")}</b>`:""; }
}
function toggleBypass(name){
  const on=!BYPASS.has(name);
  fetch("/api/bypass",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({node:name,on})})
    .then(r=>r.json()).then(d=>{ BYPASS=new Set(d.nodes||[]); renderBypass();
      if(pinned===name) showInfo(name,(DATA&&DATA.nodes)||{}); })
    .catch(()=>{ const m=document.getElementById("cfgMeta"); if(m) m.textContent="bypass needs the live backend (static server?)"; });
}

// ---- feature 2: per-node config viewer (+ per-node download) ----
function loadConfig(name){
  const meta=document.getElementById("cfgMeta"), pre=document.getElementById("cfgPre");
  if(!meta||!pre) return;
  fetch("/api/config?node="+encodeURIComponent(name),{cache:"no-store"})
    .then(r=>r.ok?r.json():Promise.reject(r.status))
    .then(d=>{
      meta.innerHTML=`<b>${d.kind}</b> · <a id="cfgDl">download</a>`;
      pre.textContent=d.text; pre.style.display="block";
      const dl=document.getElementById("cfgDl");
      if(dl) dl.addEventListener("click",()=>{
        const ext=(d.kind||"").indexOf("json")>=0?".json":".conf";
        const b=new Blob([d.text],{type:"text/plain"}), u=URL.createObjectURL(b);
        const a=document.createElement("a"); a.href=u; a.download=name+ext; a.click();
        URL.revokeObjectURL(u);
      });
    })
    .catch(e=>{ meta.textContent = e===404 ? "no config on file for this node"
                                           : "config unavailable (static server / file://)"; });
}

// ---------- paths table (test-probe health) ----------
function natCmp(a,b){ return a.localeCompare(b,undefined,{numeric:true}); }
function fmtMs(v){ return (v==null)?'<span class="miss">·</span>':(+v).toFixed(2); }
function fmtPct(v){ return (v==null)?'<span class="miss">·</span>':(+v).toFixed(v<10?1:0); }

// classify one direction's probe health -> {cls,label}
function dirStatus(h){
  if(!h) return {cls:'none',label:'no data'};
  if(h.denied) return {cls:'denied',label:'denied'};
  if(!h.up || (h.loss_pct!=null&&h.loss_pct>=100)) return {cls:'down',label:'down'};
  if((h.loss_pct!=null&&h.loss_pct>1)||h.encap_ok===false) return {cls:'deg',label:'degraded'};
  return {cls:'up',label:'up'};
}
// worst of two directions (none ranks last so a measured side wins)
const STRANK={down:4,denied:3,deg:2,up:1,none:0};
function worst(a,b){ return STRANK[a.cls]>=STRANK[b.cls]?a:b; }

// the carrier hops a path takes, for SVG highlighting
function pathHops(rec){
  const seq=[rec.src,rec.src_leaf,rec.spine,rec.dst_leaf,rec.dst].filter(Boolean);
  return seq.filter((h,i)=>i===0||h!==seq[i-1]);   // collapse repeats (same-leaf)
}
function highlightPath(rec){
  if(!EDGES) return;
  const seq=pathHops(rec), want=new Set(), nodes=new Set(seq);
  for(let i=0;i<seq.length-1;i++){ want.add(seq[i]+'␀'+seq[i+1]); want.add(seq[i+1]+'␀'+seq[i]); }
  EDGES.forEach(e=>{ const on=want.has(e.a+'␀'+e.b);
    e.el.classList.toggle('hot',on); e.el.classList.toggle('dim',!on); });
  Object.entries(byName).forEach(([n,g])=>g.classList.toggle('dim',!nodes.has(n)));
}
function clearPathHi(){
  if(!EDGES) return;
  EDGES.forEach(e=>e.el.classList.remove('hot','dim'));
  Object.values(byName).forEach(g=>g.classList.remove('dim'));
  if(pinned) highlight(pinned,EDGES);
}

// index latest health by src|dst|path_id (from MESH if present, else null)
function healthIndex(){
  const H={};
  const src=(MESH&&MESH.paths)?MESH.paths:null;
  if(src) src.forEach(p=>{ H[p.src+'|'+p.dst+'|'+p.path_id]=p.health||null; });
  return H;
}

function rebuildPaths(){
  const base=(DATA&&DATA.paths)||[];
  const tbl=document.getElementById('pathsTable');
  const empty=document.getElementById('pathsEmpty');
  const tb=tbl.tBodies[0], thead=tbl.tHead;
  tb.innerHTML=''; thead.innerHTML='';
  if(!base.length){
    tbl.style.display='none'; empty.style.display='';
    empty.innerHTML='This fabric has no <b>paths[]</b> in fabric_vars.json '+
      '(needs homed mode — <code>--gpus-per-leaf</code> — and the current generator). '+
      'Redeploy to populate the path inventory.';
    updateMeshStat(); return;
  }
  tbl.style.display=''; empty.style.display='none';
  const H=healthIndex();
  const sym=document.getElementById('symToggle').checked;
  sym?renderSym(base,H,thead,tb):renderDirected(base,H,thead,tb);
  updateMeshStat();
}

function hCell(h){   // forward/return metric cells: rtt + loss
  return `<td class="num dir">${fmtMs(h&&h.rtt_avg)}</td><td class="num">${fmtPct(h&&h.loss_pct)}</td>`;
}
function viaCell(rec){
  const dr=rec.drained?' <span class="draintag">drained</span>':'';
  return rec.spine
    ? `<b>${shortName(rec.spine)}</b>${dr}<br><span class="carrier">${rec.usid}</span>`
    : `<span class="st-none">direct</span>${dr}<br><span class="carrier">${rec.usid}</span>`;
}
function statusCell(s){ return `<span class="dot ${s.cls}"></span><span class="st-${s.cls}">${s.label}</span>`; }

function renderSym(base,H,thead,tb){
  thead.innerHTML=
    '<tr><th>path</th><th>plane</th><th>via / carrier uSID</th>'+
    '<th class="grp" colspan="2">→ forward</th><th class="grp" colspan="2">← return</th>'+
    '<th>status</th></tr>'+
    '<tr><th></th><th></th><th></th>'+
    '<th class="num dir">rtt ms</th><th class="num">loss%</th>'+
    '<th class="num dir">rtt ms</th><th class="num">loss%</th><th></th></tr>';
  // group by unordered pair + plane + carrier(path_id)
  const groups=new Map();
  base.forEach(rec=>{
    const A=natCmp(rec.src,rec.dst)<=0?rec.src:rec.dst;
    const B=A===rec.src?rec.dst:rec.src;
    const key=A+'|'+B+'|'+rec.plane+'|'+rec.path_id;
    let g=groups.get(key);
    if(!g){ g={A,B,plane:rec.plane,key,fwd:null,ret:null}; groups.set(key,g); }
    if(rec.src===A) g.fwd=rec; else g.ret=rec;
  });
  const rows=[...groups.values()].sort((x,y)=>
    natCmp(x.A,y.A)||natCmp(x.B,y.B)||x.plane-y.plane||natCmp((x.fwd||x.ret).path_id,(y.fwd||y.ret).path_id));
  for(const g of rows){
    const rec=g.fwd||g.ret;
    const hf=H[g.A+'|'+g.B+'|'+rec.path_id], hr=H[g.B+'|'+g.A+'|'+rec.path_id];
    const sf=dirStatus(hf), sr=dirStatus(hr), s=worst(sf,sr);
    const tr=document.createElement('tr');
    tr.innerHTML=
      `<td class="path"><b>${shortName(g.A)}</b> ↔ <b>${shortName(g.B)}</b></td>`+
      `<td><span class="pl">${g.plane}</span></td>`+
      `<td>${viaCell(rec)}</td>`+
      hCell(hf)+hCell(hr)+
      `<td>${statusCell(s)}</td>`;
    wireRow(tr,rec,g.key);
    tb.appendChild(tr);
  }
}

function renderDirected(base,H,thead,tb){
  thead.innerHTML=
    '<tr><th>flow</th><th>plane</th><th>via / carrier uSID</th>'+
    '<th class="num dir">rtt ms</th><th class="num">loss%</th><th class="num">jitter</th>'+
    '<th class="num">age</th><th>status</th></tr>';
  const rows=[...base].sort((x,y)=>
    natCmp(x.src,y.src)||natCmp(x.dst,y.dst)||x.plane-y.plane||natCmp(x.path_id,y.path_id));
  for(const rec of rows){
    const h=H[rec.src+'|'+rec.dst+'|'+rec.path_id];
    const s=dirStatus(h);
    const tr=document.createElement('tr');
    tr.innerHTML=
      `<td class="path"><b>${shortName(rec.src)}</b> → <b>${shortName(rec.dst)}</b></td>`+
      `<td><span class="pl">${rec.plane}</span></td>`+
      `<td>${viaCell(rec)}</td>`+
      `<td class="num dir">${fmtMs(h&&h.rtt_avg)}</td>`+
      `<td class="num">${fmtPct(h&&h.loss_pct)}</td>`+
      `<td class="num">${fmtMs(h&&h.jitter)}</td>`+
      `<td class="num">${(h&&h.age_s!=null)?h.age_s+'s':'<span class=miss>·</span>'}</td>`+
      `<td>${statusCell(s)}</td>`;
    wireRow(tr,rec,rec.src+'>'+rec.dst+'|'+rec.path_id);
    tb.appendChild(tr);
  }
}

function wireRow(tr,rec,key){
  if(key===selPathKey) tr.classList.add('sel');
  tr.addEventListener('mouseenter',()=>{ if(!selPathKey) highlightPath(rec); });
  tr.addEventListener('mouseleave',()=>{ if(!selPathKey) clearPathHi(); });
  tr.addEventListener('click',()=>{
    if(selPathKey===key){ selPathKey=null; tr.classList.remove('sel'); clearPathHi(); }
    else{ selPathKey=key;
      document.querySelectorAll('#pathsTable tr.sel').forEach(r=>r.classList.remove('sel'));
      tr.classList.add('sel'); highlightPath(rec); }
  });
}

function updateMeshStat(){
  const el=document.getElementById('meshStat');
  const base=(DATA&&DATA.paths)||[];
  if(!base.length){ el.textContent=''; return; }
  if(!backendOk && !MESH){
    el.innerHTML='<b>'+base.length+'</b> paths · no backend — showing inventory only '+
      '(serve via <code>gui/server.py</code> for live probe health)';
    return;
  }
  const ps=MESH&&MESH.paths?MESH.paths:[];
  let up=0,meas=0,down=0;
  ps.forEach(p=>{ if(p.health){ meas++; if(p.health.up&&!(p.health.loss_pct>=100)) up++; else down++; } });
  const nics=MESH&&MESH.sources?Object.keys(MESH.sources).length:0;
  el.innerHTML=`<b>${up}</b>/${base.length} paths up · <b>${down}</b> down · `+
    `<b>${meas}</b> measured · <b>${nics}</b> NIC${nics===1?'':'s'} reporting`+
    (MESH&&MESH.updated?` · updated ${ago(MESH.updated)}`:'');
}
function ago(ts){ const s=Math.max(0,Math.round(Date.now()/1000-ts)); return s<2?'just now':s+'s ago'; }

async function pollMesh(){
  try{
    const r=await fetch('/api/mesh',{cache:'no-store'});
    if(r.ok){ MESH=await r.json(); backendOk=true;
      BYPASS=new Set((MESH&&MESH.bypass)||[]); renderBypass(); }
    else backendOk=false;
  }catch(e){ backendOk=false; }   // static server / file:// — keep inventory view
  rebuildPaths();
}
document.getElementById('symToggle').addEventListener('change',rebuildPaths);

// ---------- helpers ----------
function el(tag,attrs,text){
  const e=document.createElementNS(SVGNS,tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]);
  if(text!=null) e.textContent=text;
  return e;
}
function shortName(n){ return n.replace(/-p\d+$/,""); }
function loStr(lo){ return lo.replace(/::1$/,"::").replace(/^fd00:/,""); }
function fit(svg){
  const stage=document.getElementById("stage");
  const vb=svg.viewBox.baseVal;
  const sx=(stage.clientWidth-40)/vb.width, sy=(stage.clientHeight-40)/vb.height;
  const s=Math.min(1,sx,sy);
  svg.setAttribute("width",vb.width*s);
  svg.setAttribute("height",vb.height*s);
}
document.getElementById("fit").addEventListener("click",()=>window._fit&&window._fit());
document.getElementById("dlcfg").addEventListener("click",()=>{ location.href="/api/configs.tar.gz"; });
window.addEventListener("resize",()=>window._fit&&window._fit());
// console modal wiring (feature 4)
fetchConsoleInfo();
document.getElementById("mClose").addEventListener("click",closeConsole);
document.querySelectorAll(".modal .tab").forEach(t=>t.addEventListener("click",()=>switchPane(t.dataset.pane)));
document.getElementById("runBtn").addEventListener("click",runCmd);
document.getElementById("runInput").addEventListener("keydown",e=>{ if(e.key==="Enter") runCmd(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&
  document.getElementById("consoleModal").classList.contains("open")) closeConsole(); });
boot();
pollMesh();                         // live probe health (no-op when no backend)
setInterval(pollMesh,3000);
</script>
