hostname p0-leaf01
no service integrated-vtysh-config
!
password zebra
enable password zebra
!
vrf Vrf-green
 ip nht resolve-via-default
 ipv6 nht resolve-via-default
exit-vrf
!
vrf vrfdefault
 ip nht resolve-via-default
 ipv6 nht resolve-via-default
exit-vrf
!
ip nht resolve-via-default
ipv6 nht resolve-via-default
!
ipv6 route fc00:0000:10::/48 2001:db8:fab:0001::0
ipv6 route fc00:0000:11::/48 2001:db8:fab:0003::0
ipv6 route fc00:0000:20::/48 2001:db8:fab:0001::0
ipv6 route fc00:0000:20::/48 2001:db8:fab:0003::0
!
segment-routing
 srv6
  static-sids
   sid fc00:0000:21::/48 locator MAIN behavior uN
   sid fc00:0000:f000::/48 locator MAIN behavior uA interface Ethernet0 nexthop 2001:db8:fab:0001::0
   sid fc00:0000:f001::/48 locator MAIN behavior uA interface Ethernet4 nexthop 2001:db8:fab:0003::0
   sid fc00:0000:d000::/48 locator MAIN behavior uDT6 vrf Vrf-green
   sid fc00:0000:e009::/48 locator MAIN behavior uA interface Ethernet36 nexthop 2001:db8:cccc:01::2
   sid fc00:0000:dfff::/48 locator MAIN behavior uDT6 vrf default
  exit
  !
 exit
 !
 srv6
  encapsulation
   source-address fc00:0000:21::1
  exit
  locators
   locator MAIN
    prefix fc00:0000:21::/48 block-len 32 node-len 16 func-bits 16
    behavior usid
   exit
   !
  exit
  !
  formats
   format usid-f3216
   exit
   !
   format uncompressed-f4024
   exit
   !
  exit
  !
 exit
!
exit
!
end
