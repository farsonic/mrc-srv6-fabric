hostname p0-spine01
no service integrated-vtysh-config
!
password zebra
enable password zebra
!
ip nht resolve-via-default
ipv6 nht resolve-via-default
!
ipv6 route fc00:0000:20::/48 2001:db8:fab:0002::1
ipv6 route fc00:0000:21::/48 2001:db8:fab:0003::1
!
segment-routing
 srv6
  static-sids
   sid fc00:0000:11::/48 locator MAIN behavior uN
   sid fc00:0000:e000::/48 locator MAIN behavior uA interface Ethernet0 nexthop 2001:db8:fab:0002::1
   sid fc00:0000:e001::/48 locator MAIN behavior uA interface Ethernet4 nexthop 2001:db8:fab:0003::1
  exit
  !
 exit
 !
 srv6
  encapsulation
   source-address fc00:0000:11::1
  exit
  locators
   locator MAIN
    prefix fc00:0000:11::/48 block-len 32 node-len 16 func-bits 16
    behavior usid
   exit
   !
  exit
  !
  formats
   format usid-f3216
   exit
   !
   format uncompressed-f4024
   exit
   !
  exit
  !
 exit
!
exit
!
end
