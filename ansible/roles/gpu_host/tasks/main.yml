---
# GPU hosts have no FRR — configure interface IPv6 + static routes with iproute2.
# Uses 'raw' so it works even if the GPU image ships no Python. 'replace' makes
# both idempotent; nexthops sit on connected /64s so the kernel picks the device.

- name: Bootstrap GPU tooling (iproute2 + python3) — image-agnostic (Debian apt / Alpine apk)
  # Minimal images (e.g. debian:bookworm) ship NO `ip` command, and the NIC needs
  # python3. Install both BEFORE any `ip` call below. Runs under dash (Ansible raw),
  # so this is a flat one-liner: no parens-across-newlines, no bashisms. Idempotent.
  # iproute2 >= 6.1 (bookworm ships 6.1) is REQUIRED for spec-mode NIC uSID decap.
  ansible.builtin.raw: >-
    if command -v ip >/dev/null 2>&1 && command -v python3 >/dev/null 2>&1 && command -v ping >/dev/null 2>&1; then echo "tooling present"; elif command -v apt-get >/dev/null 2>&1; then apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq iproute2 python3 iputils-ping tcpdump >/dev/null 2>&1 && echo "apt installed"; elif command -v apk >/dev/null 2>&1; then apk add --no-cache iproute2 python3 iputils-ping iputils tcpdump >/dev/null 2>&1 && echo "apk installed"; else echo "no package manager" >&2; exit 1; fi
  changed_when: true

- name: Confirm iproute2 is present and report version (spec-mode needs >= 6.1)
  ansible.builtin.raw: "ip -V"
  register: gpu_iproute2
  changed_when: false

- name: Show iproute2 version
  ansible.builtin.debug:
    var: gpu_iproute2.stdout_lines

- name: Configure GPU NIC IPv6 addresses
  ansible.builtin.raw: "ip -6 addr replace {{ item.ipv6 }} dev {{ item.name }}"
  loop: "{{ node.interfaces }}"
  loop_control:
    label: "{{ item.name }} {{ item.ipv6 }} -> {{ item.peer }}"
  changed_when: true

- name: Configure GPU static routes (ECMP across this plane's leaf gateways)
  ansible.builtin.raw: >
    ip -6 route replace {{ item.dest }}
    {{ item.nexthops | map('regex_replace', '^(.+)$', 'nexthop via \1') | join(' ') }}
  loop: "{{ node.routes }}"
  loop_control:
    label: "{{ item.dest }} via {{ item.nexthops | join(',') }}"
  changed_when: true

- name: Show GPU IPv6 routing table
  ansible.builtin.raw: ip -6 route show
  register: gpu_routes
  changed_when: false

- name: Print GPU routes
  ansible.builtin.debug:
    var: gpu_routes.stdout_lines
